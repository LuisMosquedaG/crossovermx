# Fixed syntax error
name: Desplegar CrossoverMX en VPS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Instalar Composer
        run: composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias de Node y construir frontend
        run: |
          npm install
          npm run build

      - name: Preparar .env
        run: |
          cp .env.example .env || true
          php artisan key:generate --force

      - name: Desplegar en VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/crossovermx
            git fetch origin
            git reset --hard origin/master
            composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader
            npm install
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "Despliegue completado el $(date)"